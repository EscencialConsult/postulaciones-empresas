<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONE Talent Hub — Recuperar contraseña</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="estilos.css">
<style>
  .rec-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; gap: 22px; }
  .rec-card { padding: 34px; width: 100%; max-width: 420px; }
  .rec-card h1 { font-size: 1.45rem; margin: 14px 0 4px; }
  .rec-card > p.sub { color: var(--muted); margin: 0 0 22px; font-size: .92rem; }
  .msg { font-size: .9rem; margin-top: 14px; padding: 12px 14px; border-radius: 10px; display: none; line-height: 1.45; }
  .msg.ok { background: rgba(18,185,129,.12); color: #0f766e; display: block; }
  .msg.err { background: rgba(209,67,111,.12); color: var(--error); display: block; }
  .rec-card .alt { text-align: center; margin: 18px 0 0; font-size: .9rem; color: var(--muted); }
  .rec-card .alt a { color: var(--acento); font-weight: 700; text-decoration: none; }
</style>
</head>
<body>

<div class="rec-wrap">
  <a class="logo" href="index.html"><img class="logo-img" src="assets/logo-trim.png" alt="ONE"><span class="marca-txt">Talent Hub</span></a>

  <!-- Paso 1: pedir el enlace por email -->
  <form class="card rec-card oculto" id="formPedir" novalidate>
    <span class="pill"><span class="dot"></span>Recuperar acceso</span>
    <h1>¿Olvidaste tu contraseña?</h1>
    <p class="sub">Ingresá el email de tu cuenta y te enviaremos un enlace para crear una nueva contraseña.</p>
    <div class="campo"><label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" required placeholder="tu@email.com"></div>
    <button class="btn btn-prim btn-w" id="btnPedir" type="submit">Enviar enlace</button>
    <div class="msg" id="msgPedir"></div>
    <p class="alt"><a id="volverLogin1" href="empresas.html">← Volver a iniciar sesión</a></p>
  </form>

  <!-- Paso 2: crear la nueva contraseña (con token del enlace) -->
  <form class="card rec-card oculto" id="formNueva" novalidate>
    <span class="pill"><span class="dot"></span>Nueva contraseña</span>
    <h1>Creá tu nueva contraseña</h1>
    <p class="sub">Elegí una contraseña de al menos 6 caracteres.</p>
    <div class="campo"><label for="nueva">Nueva contraseña</label>
      <input id="nueva" type="password" autocomplete="new-password" minlength="6" required></div>
    <div class="campo"><label for="nueva2">Repetir contraseña</label>
      <input id="nueva2" type="password" autocomplete="new-password" minlength="6" required></div>
    <button class="btn btn-prim btn-w" id="btnNueva" type="submit">Guardar contraseña</button>
    <div class="msg" id="msgNueva"></div>
    <p class="alt" id="linkLoginNueva" style="display:none"><a id="volverLogin2" href="empresas.html">Ir a iniciar sesión →</a></p>
  </form>
</div>

<script src="config.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const tipo = (params.get('tipo') === 'postulante') ? 'postulante' : 'empresa';
  const token = (params.get('token') || '').trim();
  const loginUrl = tipo === 'postulante' ? 'postular.html' : 'empresas.html';

  document.getElementById('volverLogin1').href = loginUrl;
  document.getElementById('volverLogin2').href = loginUrl;

  const formPedir = document.getElementById('formPedir');
  const formNueva = document.getElementById('formNueva');

  if (token) formNueva.classList.remove('oculto');
  else formPedir.classList.remove('oculto');

  function mostrarMsg(el, texto, tipoMsg) {
    el.textContent = texto;
    el.className = 'msg ' + tipoMsg;
  }

  /* ---------- Paso 1: pedir enlace ---------- */
  formPedir.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnPedir');
    const msg = document.getElementById('msgPedir');
    const email = document.getElementById('email').value.trim();
    if (!email) { mostrarMsg(msg, 'Ingresá tu email.', 'err'); return; }
    btn.disabled = true; btn.textContent = 'Enviando…';
    try {
      const r = await apiCall({ action: 'recuperarPassword', tipo: tipo, email: email });
      if (r.ok) {
        mostrarMsg(msg, r.mensaje || 'Si el email está registrado, te enviamos un enlace.', 'ok');
        formPedir.querySelector('#email').disabled = true;
        btn.textContent = 'Enlace enviado';
      } else {
        mostrarMsg(msg, r.error || 'No se pudo procesar la solicitud.', 'err');
        btn.disabled = false; btn.textContent = 'Enviar enlace';
      }
    } catch (ex) {
      mostrarMsg(msg, ex.message, 'err');
      btn.disabled = false; btn.textContent = 'Enviar enlace';
    }
  });

  /* ---------- Paso 2: guardar nueva contraseña ---------- */
  formNueva.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnNueva');
    const msg = document.getElementById('msgNueva');
    const nueva = document.getElementById('nueva').value;
    const nueva2 = document.getElementById('nueva2').value;
    if (nueva.length < 6) { mostrarMsg(msg, 'La contraseña debe tener al menos 6 caracteres.', 'err'); return; }
    if (nueva !== nueva2) { mostrarMsg(msg, 'Las contraseñas no coinciden.', 'err'); return; }
    btn.disabled = true; btn.textContent = 'Guardando…';
    try {
      const r = await apiCall({ action: 'resetearPassword', tipo: tipo, token: token, nuevaPassword: nueva });
      if (r.ok) {
        mostrarMsg(msg, r.mensaje || 'Contraseña actualizada.', 'ok');
        formNueva.querySelector('#nueva').disabled = true;
        formNueva.querySelector('#nueva2').disabled = true;
        btn.style.display = 'none';
        document.getElementById('linkLoginNueva').style.display = 'block';
      } else {
        mostrarMsg(msg, r.error || 'No se pudo actualizar la contraseña.', 'err');
        btn.disabled = false; btn.textContent = 'Guardar contraseña';
      }
    } catch (ex) {
      mostrarMsg(msg, ex.message, 'err');
      btn.disabled = false; btn.textContent = 'Guardar contraseña';
    }
  });
</script>
</body>
</html>
