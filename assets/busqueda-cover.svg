<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" width="640" height="260" role="img" aria-label="Entrevista de trabajo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9d9f6"/>
      <stop offset="1" stop-color="#d3f2f3"/>
    </linearGradient>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".35"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="640" height="260" fill="url(#bg)"/>
  <circle cx="90" cy="60" r="120" fill="#ffffff" opacity=".18"/>
  <circle cx="560" cy="40" r="90" fill="#ffffff" opacity=".14"/>

  <!-- Ventana / ambiente de oficina -->
  <g opacity=".9">
    <rect x="250" y="26" width="150" height="96" rx="8" fill="url(#win)"/>
    <line x1="325" y1="26" x2="325" y2="122" stroke="#c9c2e0" stroke-width="3"/>
    <line x1="250" y1="74" x2="400" y2="74" stroke="#c9c2e0" stroke-width="3"/>
  </g>
  <!-- Planta -->
  <g transform="translate(556,120)">
    <rect x="-14" y="34" width="28" height="26" rx="4" fill="#b23ca6" opacity=".85"/>
    <path d="M0 34 C-26 20 -26 -12 -2 -22 C-6 2 4 20 0 34Z" fill="#3aa79a"/>
    <path d="M0 34 C26 18 26 -14 2 -24 C8 4 -2 20 0 34Z" fill="#57c7bb"/>
  </g>

  <!-- Mesa -->
  <rect x="70" y="188" width="500" height="20" rx="10" fill="#8a6f57"/>
  <rect x="70" y="188" width="500" height="9" rx="4.5" fill="#a98a6c"/>

  <!-- Entrevistador (izquierda) -->
  <g>
    <path d="M150 188 C150 150 168 132 196 132 C224 132 242 150 242 188 Z" fill="#6be1e3"/>
    <circle cx="196" cy="108" r="26" fill="#f0c39f"/>
    <path d="M170 104 C172 84 190 78 196 78 C214 78 222 92 222 106 C214 98 202 96 196 100 C188 96 178 98 170 104Z" fill="#3a2b45"/>
    <path d="M232 186 C244 172 250 160 244 152 C238 146 226 152 220 168 Z" fill="#f0c39f"/>
  </g>

  <!-- Candidato (derecha) -->
  <g>
    <path d="M398 188 C398 150 416 132 444 132 C472 132 490 150 490 188 Z" fill="#e17bd7"/>
    <circle cx="444" cy="108" r="26" fill="#f4cbb0"/>
    <path d="M418 108 C416 86 432 76 444 76 C460 76 472 88 470 108 C462 96 452 94 444 96 C434 94 426 98 418 108Z" fill="#5a3d2b"/>
    <path d="M408 186 C396 172 390 160 396 152 C402 146 414 152 420 168 Z" fill="#f4cbb0"/>
  </g>

  <!-- Portapapeles del entrevistador -->
  <g transform="rotate(-8 250 176)">
    <rect x="228" y="158" width="46" height="34" rx="4" fill="#ffffff"/>
    <rect x="244" y="154" width="14" height="7" rx="3" fill="#b23ca6"/>
    <line x1="235" y1="168" x2="267" y2="168" stroke="#c9c2e0" stroke-width="3"/>
    <line x1="235" y1="176" x2="267" y2="176" stroke="#c9c2e0" stroke-width="3"/>
    <line x1="235" y1="184" x2="256" y2="184" stroke="#c9c2e0" stroke-width="3"/>
  </g>
  <!-- Laptop del candidato -->
  <g>
    <rect x="372" y="168" width="52" height="24" rx="3" fill="#37324a"/>
    <rect x="376" y="171" width="44" height="18" rx="2" fill="#6be1e3" opacity=".9"/>
    <rect x="366" y="190" width="64" height="6" rx="3" fill="#4a4560"/>
  </g>
</svg>
